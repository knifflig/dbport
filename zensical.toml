[project]
site_name = "DBPort"
site_url = "https://knifflig.github.io/dbport"
site_description = "DuckDB-native runtime for building reproducible warehouse datasets"
repo_url = "https://github.com/knifflig/dbport"
repo_name = "knifflig/dbport"

copyright = "Copyright &copy; 2026 knifflig"

nav = [
    { "Home" = "index.md" },
    { "Getting Started" = [
        "getting-started/index.md",
        "getting-started/installation.md",
        "getting-started/credentials.md",
        "getting-started/quickstart.md",
    ]},
    { "Concepts" = [
        "concepts/index.md",
        "concepts/inputs.md",
        "concepts/outputs.md",
        "concepts/metadata.md",
        "concepts/lock-file.md",
        "concepts/versioning.md",
    ]},
    { "API Reference" = [
        "api/index.md",
        "api/python.md",
        "api/cli.md",
    ]},
    { "Examples" = [
        "examples/index.md",
        "examples/python-workflow.md",
        "examples/cli-workflow.md",
    ]},
    { "Changelog" = "changelog.md" },
    { "Roadmap" = "roadmap.md" },
    { "Release Versioning" = "release-versioning.md" },
]

[project.theme]
language = "en"

features = [
    "content.code.copy",
    "content.code.annotate",
    "content.tabs.link",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "deep purple"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "deep purple"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
logo = "lucide/fishing-hook"
repo = "fontawesome/brands/github"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/knifflig/dbport"
