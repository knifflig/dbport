name: Docs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Extract version from pyproject.toml
        id: pkg_version
        run: |
          PKG_VERSION=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('pyproject.toml').read_text()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', text, re.MULTILINE)
          print(m.group(1))
          ")
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches pyproject.toml version
        env:
          TAG_VERSION: ${{ github.ref_name }}
          PKG_VERSION: ${{ steps.pkg_version.outputs.version }}
        run: |
          EXPECTED="v${PKG_VERSION}"
          if [ "$TAG_VERSION" != "$EXPECTED" ]; then
            echo "::error::Tag '${TAG_VERSION}' does not match pyproject.toml version '${PKG_VERSION}' (expected tag '${EXPECTED}')"
            exit 1
          fi
          echo "Version validated: ${PKG_VERSION}"

      - name: Build docs
        run: uv run zensical build --clean

      - name: Deploy versioned docs to gh-pages
        env:
          VERSION: ${{ steps.pkg_version.outputs.version }}
        run: |
          # Configure git for the bot
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save built site and the versions script before switching branches
          BUILT_SITE=$(mktemp -d)
          cp -r site/* "$BUILT_SITE/"
          VERSIONS_SCRIPT=$(mktemp)
          cp scripts/update_versions.py "$VERSIONS_SCRIPT"

          # Fetch or create gh-pages branch
          if git fetch origin gh-pages 2>/dev/null; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            git commit --allow-empty -m "Initialize gh-pages"
          fi

          # Deploy to versioned subdirectory
          rm -rf "$VERSION"
          mkdir -p "$VERSION"
          cp -r "$BUILT_SITE"/* "$VERSION/"

          # Update "latest" alias (full copy, not symlink — GitHub Pages doesn't support symlinks)
          rm -rf latest
          mkdir -p latest
          cp -r "$BUILT_SITE"/* latest/

          # Update versions.json (script saved before branch switch)
          python3 "$VERSIONS_SCRIPT" "$VERSION"

          # Create root index.html redirect to latest
          printf '<!DOCTYPE html>\n<html>\n  <head><meta http-equiv="refresh" content="0; url=latest/"></head>\n  <body><a href="latest/">Redirecting to latest docs...</a></body>\n</html>\n' > index.html

          # Ensure .nojekyll exists (GitHub Pages)
          touch .nojekyll

          # Commit and push
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy docs for v${VERSION}"
          git push origin gh-pages
