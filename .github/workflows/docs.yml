name: Docs

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      preview_path: ${{ steps.assemble.outputs.preview_path }}
      version: ${{ steps.pkg_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - uses: actions/configure-pages@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Extract version from pyproject.toml
        id: pkg_version
        run: |
          PKG_VERSION=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('pyproject.toml').read_text()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', text, re.MULTILINE)
          print(m.group(1))
          ")
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches pyproject.toml version
        if: github.event_name == 'push'
        env:
          TAG_VERSION: ${{ github.ref_name }}
          PKG_VERSION: ${{ steps.pkg_version.outputs.version }}
        run: |
          EXPECTED="v${PKG_VERSION}"
          if [ "$TAG_VERSION" != "$EXPECTED" ]; then
            echo "::error::Tag '${TAG_VERSION}' does not match pyproject.toml version '${PKG_VERSION}' (expected tag '${EXPECTED}')"
            exit 1
          fi
          echo "Version validated: ${PKG_VERSION}"

      - name: Build docs
        run: uv run zensical build --clean

      - name: Assemble versioned site state
        id: assemble
        env:
          VERSION: ${{ steps.pkg_version.outputs.version }}
        run: |
          set -euo pipefail

          STATE_DIR="$RUNNER_TEMP/gh-pages-state"
          ARTIFACT_DIR="$RUNNER_TEMP/pages-artifact"
          SANITIZED_REF=$(printf '%s' "$GITHUB_REF_NAME" | tr '/:@' '-' | tr -cs 'A-Za-z0-9._-' '-')
          PREVIEW_PATH="preview/${SANITIZED_REF}-${GITHUB_SHA}"

          rm -rf "$STATE_DIR" "$ARTIFACT_DIR"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git worktree add --detach "$STATE_DIR" FETCH_HEAD
          else
            git worktree add --detach "$STATE_DIR"
            git -C "$STATE_DIR" checkout --orphan gh-pages
            git -C "$STATE_DIR" rm -rf . 2>/dev/null || true
          fi

          git -C "$STATE_DIR" config user.name "github-actions[bot]"
          git -C "$STATE_DIR" config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            # Preview deploys add an isolated path without changing latest or versioned releases.
            rm -rf "$STATE_DIR/$PREVIEW_PATH"
            mkdir -p "$STATE_DIR/$PREVIEW_PATH"
            cp -r site/. "$STATE_DIR/$PREVIEW_PATH/"
            echo "preview_path=$PREVIEW_PATH" >> "$GITHUB_OUTPUT"
          else
            rm -rf "$STATE_DIR/$VERSION"
            mkdir -p "$STATE_DIR/$VERSION"
            cp -r site/. "$STATE_DIR/$VERSION/"

            rm -rf "$STATE_DIR/latest"
            mkdir -p "$STATE_DIR/latest"
            cp -r site/. "$STATE_DIR/latest/"

            (
              cd "$STATE_DIR"
              python3 "$GITHUB_WORKSPACE/scripts/update_versions.py" "$VERSION"
            )

            printf '<!DOCTYPE html>\n<html>\n  <head><meta http-equiv="refresh" content="0; url=latest/"></head>\n  <body><a href="latest/">Redirecting to latest docs...</a></body>\n</html>\n' > "$STATE_DIR/index.html"

            echo "preview_path=" >> "$GITHUB_OUTPUT"
          fi

          touch "$STATE_DIR/.nojekyll"

          git -C "$STATE_DIR" add -A
          if ! git -C "$STATE_DIR" diff --cached --quiet; then
            git -C "$STATE_DIR" commit -m "Deploy docs for v${VERSION}"
            git -C "$STATE_DIR" push origin HEAD:gh-pages
          else
            echo "No docs state changes to commit."
          fi

          mkdir -p "$ARTIFACT_DIR"
          rsync -a --delete --exclude='.git' "$STATE_DIR/" "$ARTIFACT_DIR/"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/pages-artifact

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summarize deployment
        run: |
          if [ -n "${{ needs.build.outputs.preview_path }}" ]; then
            printf 'Preview docs URL: %s%s/\n' "${{ steps.deployment.outputs.page_url }}" "${{ needs.build.outputs.preview_path }}" >> "$GITHUB_STEP_SUMMARY"
          else
            printf 'Released docs URL: %slatest/\n' "${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
            printf 'Released version URL: %s%s/\n' "${{ steps.deployment.outputs.page_url }}" "${{ needs.build.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          fi
